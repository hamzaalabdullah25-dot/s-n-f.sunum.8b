<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EKİP PROJECTS | Official</title>
    <style>
        :root {
            --neon: #00ff00;
            --bg: #0a0a0a;
            --card: #1a1a1a;
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 60px 20px;
        }
        h1 {
            color: var(--neon);
            font-size: 3rem;
            text-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
            margin: 0;
            letter-spacing: 5px;
        }
        p { color: #888; margin-top: 10px; }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1000px;
            padding-bottom: 50px;
        }
        .card {
            background: var(--card);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: 0.4s;
            cursor: pointer;
        }
        .card:hover {
            border-color: var(--neon);
            transform: translateY(-10px);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }
        .card h3 { color: var(--neon); font-size: 1.5rem; margin-bottom: 10px; }
        
        /* PANİK BUTONU */
        .panic-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #d32f2f;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>EKİP PROJECTS</h1>
        <p>Bilişim Teknolojileri ve Yazılım Paneli</p>
    </div>

    <div class="container">
        <a href="/projects.html" class="card">
            <h3>🎮 Oyun Arşivi</h3>
            <p>Okulda Engellenmeyen Güncel Oyun Listesi</p>
        </a>

        <a href="#" class="card">
            <h3>🎵 Proje Müzikleri</h3>
            <p>Arka Plan Drill & Lo-fi Mixler</p>
        </a>

        <div class="card" onclick="gizliGiris()">
            <h3>🔒 VIP Ekip Paneli</h3>
            <p>Sadece Yetkili Ekip Girebilir (Şifreli)</p>
        </div>
    </div>

    <button class="panic-btn" onclick="window.location.href='https://www.eba.gov.tr'">Hızlı EBA</button>

    <script>
        // ŞİFRE MEKANİZMASI
        function gizliGiris() {
            var sifre = prompt("Güvenlik Kodu Girin:");
            // Şifreyi küçük harfe çevirip kontrol eder
            if (sifre && sifre.toLowerCase() === "ayakkabı") {
                alert("Erişim Onaylandı! Hoş geldin kral.");
                window.location.href = "/ekip.html";
            } else if (sifre) {
                alert("Hatalı Kod! Sistemden uzaklaşın.");
            }
        }

        // KLAVYE KISAYOLU (P TUŞU)
        document.addEventListener('keydown', function(e) {
            if (e.key.toLowerCase() === 'p') {
                window.location.href = 'https://www.eba.gov.tr';
            }
        });
    </script>
</body>
</html>
