<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8/B Bilişim Proje Portalı</title>
    <style>
        :root {
            --neon: #00ff00;
            --bg: #0a0a0a;
            --card: #1a1a1a;
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 50px 20px;
            width: 100%;
        }
        h1 {
            font-size: 2.5rem;
            color: var(--neon);
            text-shadow: 0 0 10px rgba(0,255,0,0.3);
        }
        .container {
            max-width: 1000px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 90%;
        }
        .card {
            background: var(--card);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }
        .card:hover {
            border-color: var(--neon);
            transform: translateY(-5px);
        }
        
        /* İŞTE O KURTARICI BUTON */
        .panic-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #d32f2f; /* Kırmızı ama çok parlak değil */
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 9999;
            transition: 0.2s;
        }
        .panic-button:hover {
            background: #f44336;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>EKİP PROJECTS</h1>
        <p style="color: #888;">Bilişim Teknolojileri ve Yazılım Uygulama Alanı</p>
    </div>

    <div class="container">
        <a href="/projects.html" class="card">
            <h3>🎮 Oyun Arşivi</h3>
            <p>MEB Engeli Olmayan Güncel Oyunlar</p>
        </a>
        <a href="#" class="card">
            <h3>🎵 Proje Müzikleri</h3>
            <p>Arka Plan Drill & Lo-fi Mixler</p>
        </a>
    </div>

    <button class="panic-button" onclick="window.location.href='https://www.eba.gov.tr'">
        Hızlı Ders Notu (EBA)
    </button>

    <script>
        // Klavyeyi de yine de açık bıraktım, ne olur ne olmaz (P tuşu)
        document.addEventListener('keydown', function(e) {
            if (e.key.toLowerCase() === 'p') {
                window.location.href = 'https://www.eba.gov.tr';
            }
        });
    </script>
</body>
</html>
