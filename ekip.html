<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EKİP | Geliştirici Kadrosu</title>
    <style>
        :root { --neon: #00ff00; --bg: #0a0a0a; --card: #1a1a1a; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        .header { padding: 50px 20px; }
        h1 { color: var(--neon); text-shadow: 0 0 15px rgba(0,255,0,0.4); font-size: 2.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; padding: 20px; }
        .member-card { background: var(--card); border: 1px solid #333; border-radius: 15px; padding: 20px; transition: 0.3s; }
        .member-card:hover { border-color: var(--neon); transform: translateY(-5px); }
        .name { font-weight: bold; font-size: 1.2rem; color: var(--neon); margin-bottom: 5px; }
        .role { color: #888; font-size: 0.9rem; }
        .panic-btn { position: fixed; bottom: 20px; right: 20px; background: #d32f2f; color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>8/B EKİP KADROSU</h1>
        <p>Yazılım, Tasarım ve Strateji Birimi</p>
    </div>

    <div class="grid">
        <div class="member-card"><div class="name">Hamza</div><div class="role">Founder & Lead Developer</div></div>
        <div class="member-card"><div class="name">Mamat (Mehmet)</div><div class="role">Project Manager</div></div>
        <div class="member-card"><div class="name">Alperen</div><div class="role">UI/UX Designer</div></div>
        <div class="member-card"><div class="name">Enes</div><div class="role">Backend Developer</div></div>
        <div class="member-card"><div class="name">Bilal</div><div class="role">Cyber Security</div></div>
        <div class="member-card"><div class="name">Zeynel</div><div class="role">Creative Director</div></div>
        <div class="member-card"><div class="name">Resul</div><div class="role">Quality Assurance</div></div>
    </div>

    <button class="panic-btn" onclick="window.location.href='https://www.eba.gov.tr'">Hızlı EBA</button>

    <script>
        document.addEventListener('keydown', function(e) {
            if (e.key.toLowerCase() === 'p') window.location.href = 'https://www.eba.gov.tr';
        });
    </script>
</body>
</html>
