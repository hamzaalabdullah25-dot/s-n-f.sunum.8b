<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP OPERASYON MERKEZİ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff00; --bg: #050505; --gold: #c9a84c; --cream: #e8dfc8; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        .header { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #222; background: #000; flex-shrink: 0; }
        .header h1 { color: var(--neon); font-size: 1rem; margin: 0; letter-spacing: 2px; }

        /* OYUN ALANI */
        #vip-game-container { flex: 1; position: relative; overflow-y: auto; background: #0a0805; padding: 20px; display: flex; justify-content: center; }
        .game-content { max-width: 800px; width: 100%; background: #110e09; border: 2px solid var(--gold); border-radius: 10px; padding: 30px; box-shadow: 0 0 30px rgba(0,0,0,0.8); height: fit-content; margin: auto; }
        
        .game-title { font-family: 'Cinzel', serif; color: var(--gold); text-align: center; font-size: 2rem; margin-bottom: 20px; border-bottom: 1px double var(--gold); padding-bottom: 10px; }
        .stat-bar { display: flex; justify-content: space-around; background: #1a1510; padding: 10px; border-radius: 5px; margin-bottom: 20px; border: 1px solid var(--gold); }
        .stat { color: var(--cream); font-weight: bold; }
        .choice-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #2c1f0e; border: 1px solid var(--gold); color: var(--cream); cursor: pointer; text-align: left; font-family: 'Crimson Text', serif; font-size: 1.1rem; transition: 0.3s; }
        .choice-btn:hover { background: var(--gold); color: black; }

        /* ALT PANEL */
        .bottom-bar { height: 60px; background: #111; display: flex; align-items: center; padding: 0 20px; gap: 15px; border-top: 1px solid #333; flex-shrink: 0; }
        #chat-display { flex: 1; height: 40px; background: #000; border-radius: 5px; padding: 0 15px; display: flex; align-items: center; color: var(--neon); font-family: monospace; font-size: 0.9rem; border: 1px solid #222; }

        .panic-btn { position: fixed; top: 10px; right: 10px; background: #d32f2f; color: white; border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; font-weight: bold; z-index: 1000; }
    </style>
</head>
<body>

    <button class="panic-btn" onclick="window.location.href='https://www.eba.gov.tr'">HIZLI EBA</button>

    <div class="header">
        <h1>🚨 VIP BASE: CUMHURİYETİN KARA YÜZÜ</h1>
        <span style="color:#444; font-size:0.7rem;">SİSTEM: GÖMÜLÜ MOD</span>
    </div>

    <div id="vip-game-container">
        <div class="game-content">
            <div class="game-title">CUMHURİYETİN KARA YÜZÜ</div>
            <div class="stat-bar">
                <div class="stat">İtibar: <span id="itibar">50</span></div>
                <div class="stat">Teşkilat: <span id="teskilat">50</span></div>
                <div class="stat">Halk: <span id="halk">50</span></div>
            </div>
            <div id="scenario-text" style="font-family: 'Crimson Text', serif; font-size: 1.3rem; line-height: 1.6; margin-bottom: 25px; color: #e8dfc8;">
                Karakolun dumanlı odasında Mamat ve ekip seni bekliyor... Operasyon başlıyor. İlk hamlen ne olacak?
            </div>
            <div id="choices">
                <button class="choice-btn" onclick="makeChoice(10, 5, -5, 'Teşkilatı topla, sokaklara hakim ol.')">Teşkilatı harekete geçir.</button>
                <button class="choice-btn" onclick="makeChoice(-5, -5, 15, 'Halka yardım dağıt, güven kazan.')">Halkın desteğini al.</button>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <div id="chat-display"><span id="msg-text">Hoş geldin kral. Gömülü oyun aktif!</span></div>
        <input type="text" id="userInput" style="background:#000; border:1px solid #444; color:white; padding:10px; border-radius:5px; width:200px;" placeholder="Mesaj...">
        <button onclick="sendMsg()" style="background:var(--neon); border:none; padding:10px; border-radius:5px; cursor:pointer; font-weight:bold;">GÖNDER</button>
    </div>

    <script>
        let stats = { itibar: 50, teskilat: 50, halk: 50 };

        function makeChoice(i, t, h, txt) {
            stats.itibar += i; stats.teskilat += t; stats.halk += h;
            document.getElementById('itibar').innerText = stats.itibar;
            document.getElementById('teskilat').innerText = stats.teskilat;
            document.getElementById('halk').innerText = stats.halk;
            document.getElementById('scenario-text').innerText = "Son hamle: " + txt + " Oyun devam ediyor...";
            document.getElementById('msg-text').innerHTML = "<b>[Sistem]:</b> İstatistikler güncellendi.";
        }

        function sendMsg() {
            let input = document.getElementById('userInput');
            let display = document.getElementById('msg-text');
            if(input.value !== "") {
                display.innerHTML = "<b>[Sen]:</b> " + input.value;
                input.value = "";
            }
        }

        document.addEventListener('keydown', (e) => { if (e.key.toLowerCase() === 'p') window.location.href = 'https://www.eba.gov.tr'; });
    </script>
</body>
</html>
