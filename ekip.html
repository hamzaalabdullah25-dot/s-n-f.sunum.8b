<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EKİP | Geliştirici Kadrosu</title>
    <style>
        :root { --neon: #00ff00; --bg: #0a0a0a; --card: #1a1a1a; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        .header { padding: 50px 20px; }
        h1 { color: var(--neon); text-shadow: 0 0 15px rgba(0,255,0,0.4); font-size: 2.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; padding: 20px; }
        .member-card { background: var(--card); border: 1px solid #333; border-radius: 15px; padding: 25px; transition: 0.3s; }
        .member-card:hover { border-color: var(--neon); transform: translateY(-5px); }
        .name { font-weight: bold; font-size: 1.2rem; color: var(--neon); margin-bottom: 5px; }
        .role { color: #888; font-size: 0.9rem; margin-bottom: 15px; }
        
        /* INSTAGRAM BUTONLARI */
        .ig-link {
            display: inline-block;
            padding: 8px 18px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            transition: 0.3s;
        }
        .ig-link:hover { transform: scale(1.1); box-shadow: 0 0 15px rgba(188, 24, 136, 0.4); }

        .panic-btn { position: fixed; bottom: 20px; right: 20px; background: #d32f2f; color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; z-index: 1000; }
    </style>
</head>
<body>

    <div class="header">
        <h1>8/B EKİP KADROSU</h1>
        <p>Yazılım, Tasarım ve Strateji Birimi</p>
    </div>

    <div class="grid">
        <div class="member-card">
            <div class="name">Hamza</div>
            <div class="role">Founder & Developer</div>
            <a href="https://www.instagram.com/hamzaala71" target="_blank" class="ig-link">Instagram</a>
        </div>

        <div class="member-card">
            <div class="name">Mamat (Mehmet Eren)</div>
            <div class="role">Project Manager</div>
            <a href="https://www.instagram.com/mehmeteren_71" target="_blank" class="ig-link">Instagram</a>
        </div>

        <div class="member-card">
            <div class="name">Alperen</div>
            <div class="role">UI Designer</div>
            <a href="https://www.instagram.com/wq_alperen71" target="_blank" class="ig-link">Instagram</a>
        </div>

        <div class="member-card">
            <div class="name">Enes</div>
            <div class="role">Backend Developer</div>
            <a href="https://www.instagram.com/wq_enes71" target="_blank" class="ig-link">Instagram</a>
        </div>

        <div class="member-card">
            <div class="name">Bilal</div>
            <div class="role">Cyber Security</div>
            <a href="https://www.instagram.com/bilalefeekc" target="_blank" class="ig-link">Instagram</a>
        </div>

        <div class="member-card">
            <div class="name">Zeynel</div>
            <div class="role">Creative Director</div>
        </div>

        <div class="member-card">
            <div class="name">Resul</div>
            <div class="role">Testing & QA</div>
        </div>
    </div>

    <button class="panic-btn" onclick="window.location.href='https://www.eba.gov.tr'">Hızlı EBA</button>

    <script>
        document.addEventListener('keydown', function(e) {
            if (e.key.toLowerCase() === 'p') window.location.href = 'https://www.eba.gov.tr';
        });
    </script>
</body>
</html>
