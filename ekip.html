<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP OPERASYON MERKEZİ</title>
    <style>
        :root { --neon: #00ff00; --bg: #050505; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        /* ÜST BİLGİ */
        .header { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #222; background: #000; }
        .header h1 { color: var(--neon); font-size: 1rem; margin: 0; letter-spacing: 2px; }

        /* ANA OYUN EKRANI (DEV GİBİ) */
        .game-area { width: 100vw; height: calc(100vh - 110px); background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        /* ALT PANEL: CHAT VE KONTROL */
        .bottom-bar { height: 60px; background: #111; display: flex; align-items: center; padding: 0 20px; gap: 15px; border-top: 1px solid #333; }
        #chat-display { flex: 1; height: 40px; background: #000; border-radius: 5px; padding: 0 15px; display: flex; align-items: center; color: var(--neon); font-family: monospace; font-size: 0.9rem; overflow: hidden; border: 1px solid #222; }
        input { background: #000; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; width: 250px; outline: none; }
        button { background: var(--neon); color: black; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        .panic-btn { position: fixed; top: 10px; right: 10px; background: #d32f2f; color: white; border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; font-weight: bold; z-index: 1000; }
    </style>
</head>
<body>

    <button class="panic-btn" onclick="window.location.href='https://www.eba.gov.tr'">HIZLI EBA</button>

    <div class="header">
        <h1>🚨 VIP BASE: CUMHURİYETİN KARA YÜZÜ</h1>
        <span style="color:#444; font-size:0.7rem;">DURUM: AKTİF</span>
    </div>

    <div class="game-area">
        <iframe src="cumhuriyetin_kara_yuzu.html"></iframe>
    </div>

    <div class="bottom-bar">
        <div id="chat-display">
            <span id="msg-text">Hoş geldin kral. Ekip chat aktif!</span>
        </div>
        <input type="text" id="userInput" placeholder="Mesajını yaz...">
        <button onclick="sendMsg()">GÖNDER</button>
    </div>

    <script>
        function sendMsg() {
            let input = document.getElementById('userInput');
            let display = document.getElementById('msg-text');
            if(input.value !== "") {
                display.innerHTML = "<b>[Sen]:</b> " + input.value;
                input.value = "";
            }
        }
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') sendMsg();
        });
        document.addEventListener('keydown', (e) => { if (e.key.toLowerCase() === 'p') window.location.href = 'https://www.eba.gov.tr'; });
    </script>
</body>
</html>
