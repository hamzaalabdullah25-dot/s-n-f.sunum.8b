<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP EKİP MERKEZİ</title>
    <style>
        :root { --neon: #00ff00; --bg: #050505; --gray: #1a1a1a; }
        body { 
            background-color: var(--bg); color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; text-align: center;
        }
        .container {
            width: 90%; max-width: 500px; padding: 30px;
            background: var(--gray); border: 1px solid #333;
            border-radius: 15px; box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }
        h1 { color: var(--neon); font-size: 1.5rem; letter-spacing: 2px; margin-bottom: 5px; }
        .status { font-size: 0.8rem; color: #888; margin-bottom: 25px; text-transform: uppercase; }
        
        /* EKİP LİNKLERİ */
        .link-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .ekip-btn {
            padding: 15px; background: #000; border: 1px solid #444;
            color: #eee; text-decoration: none; border-radius: 8px;
            font-weight: bold; transition: 0.3s; font-size: 0.9rem;
        }
        .ekip-btn:hover { border-color: var(--neon); color: var(--neon); background: #081008; }
        
        .panic-info { margin-top: 30px; font-size: 0.7rem; color: #555; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚨 8/B VIP MERKEZİ</h1>
        <div class="status">Sistem Durumu: Güvenli / Oyun Devre Dışı</div>

        <div class="link-grid">
            <a href="https://instagram.com/mamat_kullaniciadi" target="_blank" class="ekip-btn">MAMAT</a>
            <a href="https://instagram.com/alperen_kullaniciadi" target="_blank" class="ekip-btn">ALPEREN</a>
            <a href="https://instagram.com/enes_kullaniciadi" target="_blank" class="ekip-btn">ENES</a>
            <a href="https://instagram.com/hamza_kullaniciadi" target="_blank" class="ekip-btn">HAMZA</a>
        </div>

        <div class="panic-info">Hoca gelirse "P" tuşuna bas. Sistem temizlendi.</div>
    </div>

    <script>
        // P Tuşu Koruması (Her ihtimale karşı)
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'p') window.location.href = 'https://www.eba.gov.tr';
        });
    </script>
</body>
</html>
